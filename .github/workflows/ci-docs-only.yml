name: CI

# Twin of ci.yml for docs-only PRs.
#
# ci.yml skips markdown-only changes via paths-ignore to save CI
# minutes. This workflow fires on the inverse path filter and posts
# trivial passing jobs under names that match ci.yml's, so the same
# set of check contexts reports on docs-only PRs as on every other
# PR. That keeps any branch-protection rule that treats those
# contexts as required from blocking docs-only merges.
#
# Both files use workflow name "CI" and matching job names so they
# report the same check contexts; exactly one of them runs per PR.

on:
  pull_request:
    branches: [main]
    paths:
      - '**.md'
      - 'CHANGELOG.md'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping tests"

  test-spec-invariants:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping spec-invariants"

  # Required-check stubs (ruleset). Markdown-only changes are
  # provably inert to audit.tla / the cfgs / the AST proof / the
  # verified implementation, so each formal-TLC matrix instance's
  # result is unchanged — report a trivial pass so docs-only PRs
  # aren't blocked waiting on a status that ci.yml's paths-ignore
  # prevents from ever being posted. The matrix dimension MUST mirror
  # ci.yml's audit-tlc matrix exactly so the same `audit-tlc (<cfg>)`
  # check contexts the ruleset requires are produced here too.
  audit-tlc:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - audit_main_sigstore
          - audit_main_platform
          - audit_main_workspace
          - audit_main_cdsse
          - audit_main_orphan_legacy
          - audit_bundle_bind
    steps:
      - run: echo "Docs-only PR, skipping audit-spec ${{ matrix.cfg }}"
