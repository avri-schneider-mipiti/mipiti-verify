name: CI

# Twin of ci.yml for docs-only PRs.
#
# ci.yml skips markdown-only changes via paths-ignore to save CI
# minutes. This workflow fires on the inverse path filter and posts
# trivial passing jobs under names that match ci.yml's, so the same
# set of check contexts reports on docs-only PRs as on every other
# PR. That keeps any branch-protection rule that treats those
# contexts as required from blocking docs-only merges.
#
# Both files use workflow name "CI" and matching job names so they
# report the same check contexts; exactly one of them runs per PR.

on:
  pull_request:
    branches: [main]
    paths:
      - '**.md'
      - 'CHANGELOG.md'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping tests"

  test-spec-invariants:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping spec-invariants"
