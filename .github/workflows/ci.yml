name: CI

# Runs on PRs only. Every merge to main comes via a PR that had to pass
# this same CI (required status check + required-up-to-date-branch), so
# re-running on main after squash-merge tests an identical tree — pure
# duplication. Dropping the push:main trigger saves ~5 min × N
# bot-auto-merged PRs per release.
#
# Markdown-only / CHANGELOG-only PRs skip CI too: tests have no README
# dependency, so running the full suite for a docs tweak is a waste.
# Human-authored PRs that DO need CI will change something outside
# *.md; bot-authored README-update PRs (post-release) only touch
# README.md and don't need CI at all.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'CHANGELOG.md'

jobs:
  # Single shared inert-path determination, consumed (fail-safe) by the
  # required formal jobs below. inert=true ONLY when EVERY changed file
  # is provably inert — path-inert: .github/workflows/**, **/*.md;
  # content-inert: pyproject.toml version-line only, action.yml Docker
  # image-line only. Fails OPEN: empty/ambiguous ⇒ inert=false; and on
  # ANY non-success of this job the consumers' `result != 'success'`
  # clause forces the formal work to RUN (never skip-and-report). The
  # step never aborts (set +e; exit 0) so detect-changes stays green
  # and the verdict is carried by the output, not the job status.
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      inert: ${{ steps.guard.outputs.inert }}
    steps:
      - name: Inert-path guard
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          files=$(gh pr view "$PR" --repo "$REPO" --json files \
            --jq '.files[].path' 2>/dev/null)
          echo "Changed files:"; printf '%s\n' "$files"
          inert=true
          [ -z "$files" ] && inert=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              .github/workflows/*|*.md|*/*.md) ;;
              pyproject.toml)
                bad=$(gh pr diff "$PR" --repo "$REPO" --patch 2>/dev/null | awk '
                  /^diff --git .*pyproject\.toml/ {inf=1; next}
                  /^diff --git / {inf=0}
                  inf && /^[+-]/ && !/^(\+\+\+|---)/ {
                    if ($0 !~ /^[+-]version = ".*"$/) print }')
                [ -n "$bad" ] && inert=false ;;
              action.yml)
                bad=$(gh pr diff "$PR" --repo "$REPO" --patch 2>/dev/null | awk '
                  /^diff --git .*action\.yml/ {inf=1; next}
                  /^diff --git / {inf=0}
                  inf && /^[+-]/ && !/^(\+\+\+|---)/ {
                    if ($0 !~ /docker:\/\/|^[+-][ \t]*image:/) print }')
                [ -n "$bad" ] && inert=false ;;
              *) inert=false ;;
            esac
          done <<< "$files"
          echo "inert=$inert" >> "$GITHUB_OUTPUT"
          echo "Inert (skip expensive formal jobs/steps): $inert"
          exit 0

  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    # Always run + report (required check). `always()` overrides the
    # default needs-skip so a detect-changes failure can't bypass the
    # gate; the expensive formal steps below self-gate fail-safe.
    if: ${{ always() }}
    # NO `id-token: write` here — many runner tests (e.g.
    # TestChooseAttestation) assume OIDC env vars are absent, and the
    # runner constructor auto-detects ACTIONS_ID_TOKEN_REQUEST_*
    # whenever they're present. Granting id-token to this job would
    # make the auto-detect path fire in tests that explicitly pass
    # `oidc_token=None`, breaking ~15 assume-no-OIDC tests. The BFS
    # spec test that needs real Fulcio bundles runs in a separate
    # job (test-spec-invariants) below.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # CI is read-only: runs tests, formal checks, type-checking. No
          # step does `git push` / `git commit`. Drop the token from
          # .git/config so a future step can't accidentally reuse it.
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: pip install --require-hashes -r requirements.lock

      - name: Install package and dev extras
        run: pip install --no-deps -e . && pip install pytest pytest-mock respx

      - name: Run tests (excluding spec-invariants which needs Fulcio OIDC)
        run: python -m pytest -v --ignore=tests/test_spec_invariants.py

      - name: Formal verification (Python BFS + cross-check)
        # Fail-safe inert skip: RUN unless detect-changes succeeded AND
        # judged the diff inert. detect-changes failure ⇒ runs.
        if: ${{ needs.detect-changes.result != 'success' || needs.detect-changes.outputs.inert != 'true' }}
        run: python formal/check_pipeline.py

      - name: Download TLC
        if: ${{ needs.detect-changes.result != 'success' || needs.detect-changes.outputs.inert != 'true' }}
        run: |
          TLC_URL="https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar"
          TLC_SHA="936a262061c914694dfd669a543be24573c45d5aa0ff20a8b96b23d01e050e88"
          curl -sL "$TLC_URL" -o tla2tools.jar
          echo "$TLC_SHA  tla2tools.jar" | sha256sum -c
        working-directory: formal

      - name: Formal verification (TLC — VerificationPipeline + KeySourceResolver)
        if: ${{ needs.detect-changes.result != 'success' || needs.detect-changes.outputs.inert != 'true' }}
        run: |
          # JVM tuning is precision-preserving: -Xmx8g for the BFS
          # young-gen, ParallelGC for throughput. State-space verdict
          # is unchanged.
          JAVA_OPTS="-Xmx8g -XX:+UseParallelGC"
          echo "--- TLC: VerificationPipeline reverify=false ---"
          java $JAVA_OPTS -jar tla2tools.jar -config VerificationPipeline.cfg -workers auto VerificationPipeline.tla
          echo "--- TLC: VerificationPipeline reverify=true ---"
          java $JAVA_OPTS -jar tla2tools.jar -config VerificationPipeline_reverify.cfg -workers auto VerificationPipeline.tla
          echo "--- TLC: KeySourceResolver (issuer-side resolver invariants R1-R6, R10, R12 + R3a) ---"
          java $JAVA_OPTS -jar tla2tools.jar -config KeySourceResolver.cfg -workers auto KeySourceResolver.tla
        working-directory: formal

  audit-tlc:
    # Audit-spec TLC verification — matrix over the 6 compositional
    # cfgs: the 5 Config-1 per-key_source sub-configs
    # (audit_main_sigstore / _platform / _workspace / _cdsse /
    # _orphan_legacy) + Config-2 (audit_bundle_bind). Each matrix
    # instance runs the cheap static checks (AuditView AST
    # faithfulness + Config-1 partition totality) then its one TLC
    # config. Wall-clock = max(per-cfg time); cdsse is the slow one
    # (~9 min in local validation, dominated by customer_dsse
    # predicate-canonicalisation per-state cost), other sub-configs
    # ~1-5 min. ~7× wall-clock improvement vs the previous monolithic
    # Config-1 (~1 h+).
    #
    # Each matrix instance reports as `audit-tlc (<cfg>)`. Required-
    # check ruleset rules referring to plain `audit-tlc` must be
    # updated to require each `audit-tlc (<cfg>)` context (or an
    # aggregate gate) — see formal/COMPOSITION.md "CI job split".
    #
    # Skip-gating identical to before: expensive TLC step skipped
    # only when detect-changes succeeded AND judged the diff inert
    # (path-inert: .github/workflows/**, pyproject.toml, **/*.md);
    # any change to implementation / tests / formal/** runs full
    # TLC. Cheap static checks (AST proof + totality) stay
    # unconditional — they take seconds.
    runs-on: ubuntu-latest
    needs: detect-changes
    # `always()` keeps the matrix running even if detect-changes
    # failed (fail-safe: TLC step inside re-evaluates the verdict and
    # defaults to running). Each matrix instance is a required check.
    if: ${{ always() }}
    permissions:
      contents: read
    strategy:
      # fail-fast: false so all matrix instances run to completion —
      # if one sub-config fails (real spec break or new vulnerability
      # introduced), we want to see whether ONLY that one fails or
      # whether multiple do. Per-cfg diagnostics on every PR.
      fail-fast: false
      matrix:
        cfg:
          - audit_main_sigstore
          - audit_main_platform
          - audit_main_workspace
          - audit_main_cdsse
          - audit_main_orphan_legacy
          - audit_bundle_bind
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Formal verification (AuditView faithfulness — AST proof)
        # ~seconds. Gates the lossless `VIEW AuditView` reduction in
        # every audit-spec cfg. Structurally proves every cfg invariant
        # observes the collapsed customer_dsse fields only via
        # (in)equality, so each factors through the view ⇒ the
        # reduction loses no invariant violation. Sound over-
        # approximation; fails closed on any unprovable reference.
        # Cheap to run per-matrix-instance.
        run: python formal/check_audit_view_faithful.py

      - name: Config-1 partition totality + disjointness check
        # ~seconds. Asserts the 5 audit_main_*.cfg sub-configs'
        # `allowedKS` sets union to KeySources exactly and are
        # pairwise disjoint. Fails closed with a precise diagnostic
        # if any key_source value is uncovered (a row of that class
        # would never be enumerated by any sub-config) or if two
        # sub-configs share a class (wasted coverage). Cheap to run
        # per-matrix-instance.
        run: python formal/check_audit_partition_total.py

      - name: Download TLC
        if: ${{ needs.detect-changes.result != 'success' || needs.detect-changes.outputs.inert != 'true' }}
        run: |
          TLC_URL="https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar"
          TLC_SHA="936a262061c914694dfd669a543be24573c45d5aa0ff20a8b96b23d01e050e88"
          curl -sL "$TLC_URL" -o tla2tools.jar
          echo "$TLC_SHA  tla2tools.jar" | sha256sum -c
        working-directory: formal

      - name: Formal verification (TLC — ${{ matrix.cfg }})
        if: ${{ needs.detect-changes.result != 'success' || needs.detect-changes.outputs.inert != 'true' }}
        # One TLC run per matrix instance. The 5 Config-1 sub-configs
        # pin bundle_bind to "matching, valid" (canonical
        # representative) and partition the key_source space; their
        # union covers Config 1's reachable state space (mechanically
        # checked by the totality step above). audit_bundle_bind
        # explores the full bundle_bind cross-product with pins=NONE.
        # See formal/COMPOSITION.md.
        run: |
          JAVA_OPTS="-Xmx8g -XX:+UseParallelGC"
          java $JAVA_OPTS -jar tla2tools.jar -config ${{ matrix.cfg }}.cfg -workers auto audit.tla
        working-directory: formal

  test-spec-invariants:
    # Dedicated job for the audit-spec BFS implementation check
    # (tests/test_spec_invariants.py). Bundle-present rows mint real
    # Sigstore bundles via Fulcio using the workflow's own OIDC
    # token, so this job needs `id-token: write`. Isolated from the
    # main `test` job so OIDC env vars don't leak into runner tests
    # that assume their absence. Forks don't get OIDC tokens (GitHub
    # security model), so fork-PR runs of this job detect the
    # absence at runtime and skip the bundle rows rather than fail.
    #
    # Skipped on automated version-bump PRs (head branch
    # `release/v*`, title `chore: release v*`). Those PRs only edit
    # pyproject.toml's version string — they don't touch the spec,
    # the implementation, or any code path the BFS exercises. The
    # heavy Fulcio-OIDC-minting run adds no signal there. Required-
    # check satisfaction is preserved: a job skipped via job-level
    # `if:` reports `conclusion: skipped`, which satisfies a
    # required status check.
    needs: detect-changes
    # Skip (reported `skipped` ⇒ required check satisfied) only when
    # detect-changes succeeded AND judged the diff inert, OR on the
    # automated version-bump branch. `always()` keeps the job RUNNING
    # if detect-changes did not succeed — fail-safe: the BFS runs, it
    # is never bypassed by an infra failure.
    if: ${{ always() && (needs.detect-changes.result != 'success' || needs.detect-changes.outputs.inert != 'true') && !startsWith(github.head_ref, 'release/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: pip install --require-hashes -r requirements.lock

      - name: Install package and dev extras
        run: pip install --no-deps -e . && pip install pytest pytest-mock respx pytest-xdist

      - name: Run audit-spec BFS implementation check
        # Parallelize across all available CPU cores via pytest-xdist.
        # Parametrized rows are pure functions of (pkg, pins) — no
        # shared state between rows, so xdist-safe by construction.
        # Real Fulcio bundle minting is per-worker (each xdist worker
        # is a distinct process and re-mints its bundle set on first
        # use); the 4 worker × ~8 predicate-combo mint cost is well
        # under one minute, and the ~7,200-row BFS work is the
        # dominant cost — net 3-4x speedup on a 4-core runner.
        run: python -m pytest -v -n auto tests/test_spec_invariants.py
