name: Mipiti Verify
description: Verify security controls against Mipiti threat models in CI. Runs typed assertions against your codebase and reports results.
branding:
  icon: shield
  color: blue

inputs:
  model-id:
    description: Mipiti threat model ID (omit if using all)
    required: false
    default: ""
  all:
    description: Verify all models in the workspace
    required: false
    default: "false"
  api-key:
    description: Mipiti API key (MIPITI_API_KEY)
    required: true
  base-url:
    description: API base URL
    required: false
    default: "https://api.mipiti.io"
  tier2-provider:
    description: "AI provider for Tier 2 verification: openai, anthropic, or ollama"
    required: false
    default: ""
  tier2-model:
    description: Model name (e.g. gpt-4o, claude-sonnet-4-5-20250514)
    required: false
    default: ""
  tier2-api-key:
    description: Provider API key (OpenAI or Anthropic)
    required: false
    default: ""
  project-root:
    description: Project root directory
    required: false
    default: "."
  reverify:
    description: Re-verify all assertions, not just pending (default true)
    required: false
    default: "true"
  dry-run:
    description: Run verifiers but don't submit results
    required: false
    default: "false"
  concurrency:
    description: Max concurrent Tier 2 LLM calls
    required: false
    default: "1"
  sigstore-tuf-url:
    description: Custom Sigstore TUF root URL for private deployments (default public sigstore.dev)
    required: false
    default: ""
  sigstore-trust-config:
    description: Path to a pre-downloaded Sigstore ClientTrustConfig JSON (out-of-band snapshot, skips all TUF network fetches)
    required: false
    default: ""
  workspace-signing-key:
    description: "Path to a PEM ECDSA P-256 private key for workspace-attested submission. Used when no OIDC token is available (e.g. self-hosted runners without id-token: write), or when signing-prefer=workspace. The matching public key must be registered on the Mipiti workspace."
    required: false
    default: ""
  signing-prefer:
    description: "When both an OIDC token and a workspace key are available, prefer this signer ('sigstore' or 'workspace'). Default: sigstore."
    required: false
    default: "sigstore"

outputs:
  content-hash:
    description: "SHA-256 content hash of verified assertions (sha256:<hex>). Use with actions/attest-build-provenance for Sigstore attestation."

runs:
  using: docker
  image: docker://ghcr.io/mipiti/mipiti-verify:v0.35.1@sha256:03ca7c3f1207eae994d2794021c903ada0f6f5d19704af1aaf71dd5795c5ee93
  env:
    MIPITI_API_KEY: ${{ inputs.api-key }}
    MIPITI_BASE_URL: ${{ inputs.base-url }}
    OPENAI_API_KEY: ${{ inputs.tier2-api-key }}
    ANTHROPIC_API_KEY: ${{ inputs.tier2-api-key }}
    INPUT_MODEL_ID: ${{ inputs.model-id }}
    INPUT_ALL: ${{ inputs.all }}
    INPUT_PROJECT_ROOT: ${{ inputs.project-root }}
    INPUT_TIER2_PROVIDER: ${{ inputs.tier2-provider }}
    INPUT_TIER2_MODEL: ${{ inputs.tier2-model }}
    INPUT_REVERIFY: ${{ inputs.reverify }}
    INPUT_DRY_RUN: ${{ inputs.dry-run }}
    INPUT_CONCURRENCY: ${{ inputs.concurrency }}
    INPUT_SIGSTORE_TUF_URL: ${{ inputs.sigstore-tuf-url }}
    INPUT_SIGSTORE_TRUST_CONFIG: ${{ inputs.sigstore-trust-config }}
    INPUT_WORKSPACE_SIGNING_KEY: ${{ inputs.workspace-signing-key }}
    INPUT_SIGNING_PREFER: ${{ inputs.signing-prefer }}
