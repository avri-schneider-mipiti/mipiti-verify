\* audit_main_sigstore.cfg — Config-1 sub-split, KS_SIGSTORE slice.
\*
\* Per-key_source partition of Config 1 (audit_main.cfg). Enumerates
\* only rows with pkg.ws_sig.key_source = KS_SIGSTORE via
\* InitBaseFor({KS_SIGSTORE}) — generation-time pruning, not a post-
\* filter. Same bundle_bind pinning, same INVARIANTS, same VIEW as
\* audit_main.cfg; the union of all 5 sub-configs covers the same
\* state space as the original. Lossless by construction: invariants
\* in ConfigMainInvariants are per-(pkg,pins)-row predicates and
\* key_source is a property of the row, so each row is enumerated in
\* exactly one sub-config. See formal/COMPOSITION.md for the
\* per-invariant × per-sub-config coverage matrix and
\* formal/check_audit_partition_total.py for the mechanical totality
\* + non-vacuity proof.

SPECIFICATION Spec_main_sigstore

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE      = KS_SIGSTORE
    KS_PLATFORM      = KS_PLATFORM
    KS_WORKSPACE     = KS_WORKSPACE
    KS_CUSTOMER_DSSE = KS_CUSTOMER_DSSE
    KS_ORPHAN        = KS_ORPHAN
    KS_LEGACY        = KS_LEGACY

    SUFF_ALL          = SUFF_ALL
    SUFF_INSUFFICIENT = SUFF_INSUFFICIENT
    SUFF_PENDING      = SUFF_PENDING
    SUFF_NA           = SUFF_NA

    \* Scenario knob — pinned FALSE on every existing cfg (scenario
    \* defaults are pinned at Init via DefaultScenarioPins, so this
    \* value is unobservable in invariants the cfg checks). The new
    \* scenario cfgs (audit_main_orphan_results_*, _model_only,
    \* _sufficiency) override.
    AllowOrphanResults = FALSE

SYMMETRY Symmetry

VIEW AuditView

INVARIANTS
    TypeOK
    ConfigMainInvariants
