\* audit_bundle_bind.cfg — Config 2 of the compositional split.
\*
\* Explores the full bundle_bind cross-product (Init_bind in
\* audit.tla pins all pins=NONE — that dimension does not affect
\* the bundle-bind invariants I8/I14, nor the V1/V2 cases whose
\* preconditions reference bundle_bind; ws_sig still varies fully
\* for V1/V2's key_source preconditions).
\*
\* Init_bind calls InitBase(FALSE), which enumerates
\* PackageGen(FALSE): the WSSig generator drops KS_CUSTOMER_DSSE
\* and pins the customer_dsse-only fields to singletons, so TLC
\* never generates a customer_dsse row (generation-time pruning,
\* not a post-filter). Lossless: every invariant this config
\* checks (I8, I14, V1, V2, V4) requires pkg.bundle # ABSENT in
\* its premise, and a customer_dsse row has bundle = ABSENT
\* (KeySourceResolver R12), so customer_dsse states are
\* vacuously-true for all Config-2 invariants and contribute zero
\* coverage. Completes in ~3.5 min / 142,743 distinct states.
\* Config 1 (audit_main.cfg) keeps customer_dsse — V5a/V5b/V5c
\* need it.
\*
\* See formal/COMPOSITION.md for the partition + exclusion argument.

SPECIFICATION Spec_bind

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE      = KS_SIGSTORE
    KS_PLATFORM      = KS_PLATFORM
    KS_WORKSPACE     = KS_WORKSPACE
    KS_CUSTOMER_DSSE = KS_CUSTOMER_DSSE
    KS_ORPHAN        = KS_ORPHAN
    KS_LEGACY        = KS_LEGACY

    SUFF_ALL          = SUFF_ALL
    SUFF_INSUFFICIENT = SUFF_INSUFFICIENT
    SUFF_PENDING      = SUFF_PENDING
    SUFF_NA           = SUFF_NA

    AllowOrphanResults = FALSE

SYMMETRY Symmetry

\* Lossless state-space reduction: collapses ONLY the
\* customer_dsse-specific (dsse_predicate_* × pins.model_id/commit_sha)
\* × customer_key_fp_match cross-product (162 raw -> 18 observable
\* classes). Identity on every non-customer_dsse state. Faithfulness
\* is proven by formal/check_audit_view_faithful.py (every cfg
\* invariant observes the collapsed fields only via (in)equality) and
\* corroborated by a mutation test. See formal/COMPOSITION.md.
VIEW AuditView

INVARIANTS
    TypeOK
    ConfigBindInvariants
