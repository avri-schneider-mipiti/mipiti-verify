\* audit_main_orphan_legacy.cfg — Config-1 sub-split,
\* {KS_ORPHAN, KS_LEGACY} slice.
\*
\* Both are no-canonical-bundle-path terminal classes (per
\* KeySourceResolver) and share invariant structure (V3 fires on
\* orphan-with-workspace-pin; KS_LEGACY models the pre-discriminator
\* envelope shape). Combined here so the partition has 5 sub-configs
\* (vs 6 individual) — modest CI matrix fan-out without compromising
\* state-space reduction per sub-config. The 5 sub-configs' allowed
\* key_source sets union to KeySources exactly, with no overlap
\* (mechanically checked by formal/check_audit_partition_total.py).
\*
\* See audit_main_sigstore.cfg + formal/COMPOSITION.md for the full
\* partition + soundness argument.

SPECIFICATION Spec_main_orphan_legacy

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE      = KS_SIGSTORE
    KS_PLATFORM      = KS_PLATFORM
    KS_WORKSPACE     = KS_WORKSPACE
    KS_CUSTOMER_DSSE = KS_CUSTOMER_DSSE
    KS_ORPHAN        = KS_ORPHAN
    KS_LEGACY        = KS_LEGACY

SYMMETRY Symmetry

VIEW AuditView

INVARIANTS
    TypeOK
    ConfigMainInvariants
