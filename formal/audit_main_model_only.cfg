\* audit_main_model_only.cfg — scenario knob: PDF model-only export.
\* Closes gap #254. Varies is_model_only across {FALSE, TRUE}; pins
\* fully vary (to exercise V11: any pin set ⇒ USAGE_ERROR on the
\* model-only branch) and the AllowOrphanResults knob is the cfg's
\* canonical FALSE since orphan scenarios don't apply here.
\*
\* Asserts:
\*   V10 — is_model_only /\ no pin ⇒ MODEL_ONLY
\*   V11 — is_model_only /\ any pin ⇒ USAGE_ERROR
\*   V12 — MODEL_ONLY verdict ⇒ is_model_only (sound reverse)
\*
\* See cli.py line ~2497 (USAGE_ERROR on pin+model-only) and ~2522
\* (MODEL_ONLY emission).

SPECIFICATION Spec_main_model_only

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE      = KS_SIGSTORE
    KS_PLATFORM      = KS_PLATFORM
    KS_WORKSPACE     = KS_WORKSPACE
    KS_CUSTOMER_DSSE = KS_CUSTOMER_DSSE
    KS_ORPHAN        = KS_ORPHAN
    KS_LEGACY        = KS_LEGACY

    SUFF_ALL          = SUFF_ALL
    SUFF_INSUFFICIENT = SUFF_INSUFFICIENT
    SUFF_PENDING      = SUFF_PENDING
    SUFF_NA           = SUFF_NA

    AllowOrphanResults = FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    ConfigScenarioInvariants
