\* audit_main_platform.cfg — Config-1 sub-split, KS_PLATFORM slice.
\* See audit_main_sigstore.cfg + formal/COMPOSITION.md for the full
\* partition + soundness argument.

SPECIFICATION Spec_main_platform

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE      = KS_SIGSTORE
    KS_PLATFORM      = KS_PLATFORM
    KS_WORKSPACE     = KS_WORKSPACE
    KS_CUSTOMER_DSSE = KS_CUSTOMER_DSSE
    KS_ORPHAN        = KS_ORPHAN
    KS_LEGACY        = KS_LEGACY

    SUFF_ALL          = SUFF_ALL
    SUFF_INSUFFICIENT = SUFF_INSUFFICIENT
    SUFF_PENDING      = SUFF_PENDING
    SUFF_NA           = SUFF_NA

    AllowOrphanResults = FALSE

SYMMETRY Symmetry

VIEW AuditView

INVARIANTS
    TypeOK
    ConfigMainInvariants
