\* audit_main_cdsse.cfg — Config-1 sub-split, KS_CUSTOMER_DSSE slice.
\* The slice that exercises V5a/V5b/V5c (customer_dsse pinned-property
\* invariants — see audit.tla). All bundle-path / Sigstore invariants
\* are vacuous on this slice (customer_dsse rows have bundle=ABSENT
\* per R12), so the per-row checking falls trivially through there.
\* See audit_main_sigstore.cfg + formal/COMPOSITION.md for the full
\* partition + soundness argument.

SPECIFICATION Spec_main_cdsse

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE      = KS_SIGSTORE
    KS_PLATFORM      = KS_PLATFORM
    KS_WORKSPACE     = KS_WORKSPACE
    KS_CUSTOMER_DSSE = KS_CUSTOMER_DSSE
    KS_ORPHAN        = KS_ORPHAN
    KS_LEGACY        = KS_LEGACY

SYMMETRY Symmetry

VIEW AuditView

INVARIANTS
    TypeOK
    ConfigMainInvariants
