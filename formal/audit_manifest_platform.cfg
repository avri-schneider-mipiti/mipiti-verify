\* audit_manifest_platform.cfg — manifest-signature-path TLC config,
\* KS_PLATFORM slice. Paired with audit_manifest_workspace.cfg for
\* the KS_WORKSPACE slice; together they cover the two key_source
\* classes where the manifest signature is the trust anchor (Sigstore
\* and customer_dsse cover the whole pack body via DSSE and don't
\* rely on the manifest — see audit_manifest.tla module comment for
\* the partitioning argument).
\*
\* See docs/audit-pack-signing.md (parent repo) for the protocol
\* this configuration model-checks.

SPECIFICATION Spec_platform

CONSTANTS
    \* Sections, Contents, Hashes, Keys, Fingerprints are pinned as
    \* STRING sets so the H_*_DEFAULT / FP_OF_DEFAULT operators in
    \* audit_manifest.tla can reference their elements by name when
    \* building the oracle bijection (TLC model values are opaque and
    \* cannot be referenced from within operator definitions).
    \* KS_PLATFORM / KS_WORKSPACE / NONE / ABSENT stay as TLC model
    \* values (they're never named from within the .tla module — only
    \* equality is checked).
    Sections     = {"s1", "s2"}
    Contents     = {"c1", "c2"}
    \* The hash domain contains:
    \*   h_c1 / h_c2          — H_CONTENT co-domain (one per Content)
    \*   h_m_aa / h_m_ab /
    \*   h_m_ba / h_m_bb      — H_MANIFEST co-domain (one per honest
    \*                          [Sections -> H_CONTENT-range] map)
    \*   h_tampered           — H_MANIFEST co-domain for any tampered
    \*                          manifest mapping outside H_CONTENT's
    \*                          range (a single bucket; bijective on
    \*                          honest manifests, modelling collision-
    \*                          resistance against tamper).
    \*   h_atk                — an attacker-chosen Hash that is
    \*                          neither in H_CONTENT's range nor any
    \*                          H_MANIFEST output. Lets TLC explore
    \*                          TamperManifestHash to a value the
    \*                          attacker arbitrarily picks (the worst
    \*                          case — the value is in Hashes but the
    \*                          verifier has no oracle reason to
    \*                          accept it).
    Hashes       = {"h_c1", "h_c2", "h_m_aa", "h_m_ab", "h_m_ba", "h_m_bb",
                    "h_tampered", "h_atk"}
    Keys         = {"k_a", "k_b", "k_atk"}
    Fingerprints = {"fp_a", "fp_b", "fp_atk"}

    KS_PLATFORM  = KS_PLATFORM
    KS_WORKSPACE = KS_WORKSPACE
    NONE         = NONE
    ABSENT       = ABSENT

    \* Oracle defaults — concrete bijections over the pinned domains.
    \* See audit_manifest.tla H_*_DEFAULT for the construction.
    H_CONTENT  <- H_CONTENT_DEFAULT
    H_MANIFEST <- H_MANIFEST_DEFAULT
    FP_OF      <- FP_OF_DEFAULT

\* No SYMMETRY directive: the .cfg's CONSTANT sets are pinned to
\* TLA+ strings (so the H_*_DEFAULT operators can name them when
\* building the oracle bijection), and TLC's Permutations() operator
\* requires opaque model values. State space is small enough for
\* unrestricted enumeration.

INVARIANTS
    TypeOK
    B1_Authenticity
    B2_PerSection
    B3_TamperDetection_Section
    B4_TamperDetection_Manifest
    B5_BackwardCompat
    B6_SelectiveDisclosureSound
    B6b_SelectiveDisclosure_DetectsTamper
    B7_NoForgedKeySwap
