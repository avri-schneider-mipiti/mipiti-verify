\* audit_main_orphan_results_blocked.cfg — scenario knob: orphan
\* results PRESENT, --allow-orphan-results = FALSE (auditor has NOT
\* acknowledged). Verdict must demote to FAILED (V8). Closes gap
\* #258 1b ("Orphan results fail-close by default").
\*
\* Companion cfg audit_main_orphan_results_allowed.cfg covers the
\* override case (allow = TRUE, demote to PARTIALLY_VERIFIED, V9).
\* Splitting by AllowOrphanResults value follows the "BOOLEAN
\* scenarios live in separate .cfgs" pattern (cheaper than letting
\* TLC explore both flag values in one run).
\*
\* Envelope state: pinned to a canonical KS_PLATFORM bundle-absent
\* shape that produces a positive-class envelope verdict (so V8/V9's
\* demotion targets fire). Pins fully varied — V8/V9 must compose
\* correctly with USAGE_ERROR / FAILED preemption.

SPECIFICATION Spec_main_orphan_results

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE      = KS_SIGSTORE
    KS_PLATFORM      = KS_PLATFORM
    KS_WORKSPACE     = KS_WORKSPACE
    KS_CUSTOMER_DSSE = KS_CUSTOMER_DSSE
    KS_ORPHAN        = KS_ORPHAN
    KS_LEGACY        = KS_LEGACY

    SUFF_ALL          = SUFF_ALL
    SUFF_INSUFFICIENT = SUFF_INSUFFICIENT
    SUFF_PENDING      = SUFF_PENDING
    SUFF_NA           = SUFF_NA

    AllowOrphanResults = FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    ConfigScenarioInvariants
