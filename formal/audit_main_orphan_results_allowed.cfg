\* audit_main_orphan_results_allowed.cfg — scenario knob: orphan
\* results PRESENT, --allow-orphan-results = TRUE (auditor HAS
\* acknowledged). Verdict must demote to PARTIALLY_VERIFIED, never
\* raise to a positive class (V9). Closes gap #258 1b override case.
\*
\* Companion cfg audit_main_orphan_results_blocked.cfg covers the
\* fail-closed default (allow = FALSE, demote to FAILED, V8).

SPECIFICATION Spec_main_orphan_results

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE      = KS_SIGSTORE
    KS_PLATFORM      = KS_PLATFORM
    KS_WORKSPACE     = KS_WORKSPACE
    KS_CUSTOMER_DSSE = KS_CUSTOMER_DSSE
    KS_ORPHAN        = KS_ORPHAN
    KS_LEGACY        = KS_LEGACY

    SUFF_ALL          = SUFF_ALL
    SUFF_INSUFFICIENT = SUFF_INSUFFICIENT
    SUFF_PENDING      = SUFF_PENDING
    SUFF_NA           = SUFF_NA

    AllowOrphanResults = TRUE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    ConfigScenarioInvariants
