\* audit_manifest_workspace.cfg — manifest-signature-path TLC config,
\* KS_WORKSPACE slice. Sibling of audit_manifest_platform.cfg.
\*
\* Same pinned domains, same invariants. The only difference is which
\* key_source class TLC enumerates in Init (Spec_workspace pins
\* allowedKS = {KS_WORKSPACE}). Splitting per-key_source matches
\* audit.tla's sub-config pattern and lets each matrix instance
\* report independently in CI.

SPECIFICATION Spec_workspace

CONSTANTS
    Sections     = {"s1", "s2"}
    Contents     = {"c1", "c2"}
    Hashes       = {"h_c1", "h_c2", "h_m_aa", "h_m_ab", "h_m_ba", "h_m_bb",
                    "h_tampered", "h_atk"}
    Keys         = {"k_a", "k_b", "k_atk"}
    Fingerprints = {"fp_a", "fp_b", "fp_atk"}

    KS_PLATFORM  = KS_PLATFORM
    KS_WORKSPACE = KS_WORKSPACE
    NONE         = NONE
    ABSENT       = ABSENT

    H_CONTENT  <- H_CONTENT_DEFAULT
    H_MANIFEST <- H_MANIFEST_DEFAULT
    FP_OF      <- FP_OF_DEFAULT

\* No SYMMETRY directive — see audit_manifest_platform.cfg for the
\* string-typed-CONSTANT explanation.

INVARIANTS
    TypeOK
    B1_Authenticity
    B2_PerSection
    B3_TamperDetection_Section
    B4_TamperDetection_Manifest
    B5_BackwardCompat
    B6_SelectiveDisclosureSound
    B6b_SelectiveDisclosure_DetectsTamper
    B7_NoForgedKeySwap
