\* audit_main_sufficiency.cfg — scenario knob: sufficiency_state.
\* Closes gap #258 1a ("Verdict honours pending sufficiency"). Varies
\* sufficiency_state across SufficiencyStates ({SUFF_ALL,
\* SUFF_INSUFFICIENT, SUFF_PENDING, SUFF_NA}) and pins vary fully
\* to confirm sufficiency demotion composes correctly with the
\* existing pin-dispatch verdicts (USAGE_ERROR / FAILED preempt).
\*
\* Asserts:
\*   V6 — Audit = VERIFIED ⇒ sufficiency_state ≠ SUFF_PENDING
\*   V7 — Audit = VERIFIED ⇒ sufficiency_state ≠ SUFF_INSUFFICIENT
\*
\* See cli.py lines ~4115-4141 (PARTIALLY VERIFIED on any non-
\* sufficient control, with the pending-count breakdown).

SPECIFICATION Spec_main_sufficiency

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE      = KS_SIGSTORE
    KS_PLATFORM      = KS_PLATFORM
    KS_WORKSPACE     = KS_WORKSPACE
    KS_CUSTOMER_DSSE = KS_CUSTOMER_DSSE
    KS_ORPHAN        = KS_ORPHAN
    KS_LEGACY        = KS_LEGACY

    SUFF_ALL          = SUFF_ALL
    SUFF_INSUFFICIENT = SUFF_INSUFFICIENT
    SUFF_PENDING      = SUFF_PENDING
    SUFF_NA           = SUFF_NA

    AllowOrphanResults = FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    ConfigScenarioInvariants
